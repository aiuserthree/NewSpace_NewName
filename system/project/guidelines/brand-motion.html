<!-- @dsCard group="Brand" viewport="700x210" name="Motion" subtitle="Calm — gentle fades + soft drift, no bounce" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-sans); color: var(--text-primary); }
  .durs { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
  .line { display: flex; align-items: center; gap: 12px; }
  .tok { width: 150px; font-size: 11px; color: var(--text-muted); } .tok b { color: var(--text-secondary); font-weight: 600; }
  .bar { height: 10px; border-radius: 999px; background: var(--clay-300); }
  .eases { display: flex; gap: 10px; flex-wrap: wrap; }
  .chip { font-size: 11px; padding: 6px 11px; border-radius: 999px; background: var(--surface-card);
    border: 1px solid var(--border-default); color: var(--text-secondary); }
  .conv { margin-top: 14px; font-size: 11.5px; color: var(--text-muted); }
  .conv b { color: var(--accent); }
</style></head>
<body>
  <div class="durs" id="durs"></div>
  <div class="eases">
    <span class="chip">standard · cubic-bezier(.22,.61,.36,1)</span>
    <span class="chip">out-soft · cubic-bezier(.16,1,.30,1)</span>
  </div>
  <div class="conv">hover <b>lift −2px</b> · press <b>scale .98</b> · entrance fade + rise 8px · <b>no bounce</b></div>
<script>
  const durs = [['fast','150'],['base','240'],['slow','380'],['slower','680']];
  document.getElementById('durs').innerHTML = durs.map(([t,ms]) =>
    `<div class="line"><div class="tok"><b>dur-${t}</b> · ${ms}ms</div>
     <div class="bar" style="width:${Math.round(ms/2.2)}px"></div></div>`).join('');
</script>
</body></html>
