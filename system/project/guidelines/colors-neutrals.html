<!-- @dsCard group="Colors" viewport="700x150" name="Warm Neutrals" subtitle="Stone ramp — every neutral is warm (hue ~65)" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .ramp { display: flex; gap: 5px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 62px; border-radius: 9px; box-shadow: inset 0 0 0 1px rgba(52,40,22,0.06); }
  .name { font-size: 10.5px; font-weight: 600; color: var(--text-secondary); }
  .hex { font-size: 9.5px; color: var(--text-muted); text-transform: uppercase; font-variant-numeric: tabular-nums; }
</style></head>
<body>
<div class="ramp" id="ramp"></div>
<script>
  const ramp = [
    ['--stone-50','#F8F3EB'],['--stone-100','#EFE7DA'],['--stone-150','#E7DCCB'],
    ['--stone-200','#DDCFBA'],['--stone-300','#CBB99E'],['--stone-400','#B09A79'],
    ['--stone-500','#8B7A5E'],['--stone-600','#6B5D46'],['--stone-700','#4C4232'],
    ['--stone-800','#322B20'],['--stone-900','#221D15']
  ];
  document.getElementById('ramp').innerHTML = ramp.map(([t,h]) =>
    `<div class="sw"><div class="chip" style="background:var(${t})"></div>
     <div class="name">${t.replace('--stone-','')}</div><div class="hex">${h}</div></div>`).join('');
</script>
</body></html>
