<!-- @dsCard group="Colors" viewport="700x150" name="Brand · Clay" subtitle="Terracotta accent ramp — 500 is the primary action colour" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .ramp { display: flex; gap: 6px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 62px; border-radius: 10px; box-shadow: inset 0 0 0 1px rgba(52,40,22,0.06); }
  .name { font-size: 11px; font-weight: 600; color: var(--text-secondary); letter-spacing: -0.01em; }
  .hex { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-variant-numeric: tabular-nums; }
  .dot { color: var(--accent); }
</style></head>
<body>
<div class="ramp" id="ramp"></div>
<script>
  const ramp = [
    ['--clay-50','#FBEDE4'],['--clay-100','#F5D8C6'],['--clay-200','#EBB498'],
    ['--clay-300','#DD8F6C'],['--clay-400','#CE7149'],['--clay-500','#BC5C34'],
    ['--clay-600','#A44C28'],['--clay-700','#833A1E'],['--clay-800','#5F2C18']
  ];
  document.getElementById('ramp').innerHTML = ramp.map(([t,h]) =>
    `<div class="sw"><div class="chip" style="background:var(${t})"></div>
     <div class="name">${t.replace('--','')}${t==='--clay-500'?' <span class="dot">●</span>':''}</div>
     <div class="hex">${h}</div></div>`).join('');
</script>
</body></html>
