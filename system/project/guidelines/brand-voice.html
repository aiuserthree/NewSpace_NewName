<!-- @dsCard group="Brand" viewport="700x240" name="Voice & Tone" subtitle="Warm, polite 존댓말 (~요/~습니다) · 우리·함께 · no emoji" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .list { display: flex; flex-direction: column; gap: 12px; }
  .item { display: flex; gap: 14px; align-items: baseline; }
  .quote { font-size: 16px; color: var(--text-primary); letter-spacing: -0.01em; }
  .quote.serif { font-family: var(--font-display); font-size: 20px; }
  .why { font-size: 11px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }
  .rule { margin-top: 16px; font-size: 12px; color: var(--text-secondary); border-top: 1px solid var(--border-subtle); padding-top: 12px; }
  .rule b { color: var(--accent); }
</style></head>
<body>
  <div class="list">
    <div class="item"><span class="quote serif">우리 공간의 이름을 함께 지어주세요</span><span class="why">초대 · 따뜻함</span></div>
    <div class="item"><span class="quote">각 공간별 1개는 필수, 1개는 선택으로 제안할 수 있어요.</span><span class="why">안내 · ~요체</span></div>
    <div class="item"><span class="quote">이미 신청하신 분입니다.</span><span class="why">정중 · 비난 없음</span></div>
    <div class="item"><span class="quote">제출이 완료되었습니다. 참여해 주셔서 감사합니다!</span><span class="why">감사 · ~습니다</span></div>
  </div>
  <div class="rule">기본 <b>존댓말</b> · 부드러운 <b>~요체</b>, 완료·안내는 <b>~습니다</b> · <b>우리·함께</b>로 공동체 강조 · 이모지·느낌표 남발 없음</div>
</body></html>
