<!-- @dsCard group="Spacing" viewport="700x360" name="Spacing Scale" subtitle="4px base rhythm — --space-1 … --space-13" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 14px; padding: 3.5px 0; }
  .tok { width: 128px; flex-shrink: 0; font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .tok b { color: var(--text-secondary); font-weight: 600; }
  .bar { height: 16px; border-radius: 4px; background: var(--clay-300); box-shadow: inset 0 0 0 1px rgba(52,40,22,0.05); }
</style></head>
<body>
<div id="list"></div>
<script>
  const scale = [['1','4'],['2','8'],['3','12'],['4','16'],['5','20'],['6','24'],
    ['7','32'],['8','40'],['9','48'],['10','64'],['11','80'],['12','96'],['13','128']];
  document.getElementById('list').innerHTML = scale.map(([n,px]) =>
    `<div class="row"><div class="tok"><b>space-${n}</b> · ${px}px</div>
     <div class="bar" style="width:var(--space-${n})"></div></div>`).join('');
</script>
</body></html>
