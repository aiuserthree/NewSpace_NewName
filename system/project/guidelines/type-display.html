<!-- @dsCard group="Type" viewport="700x220" name="Display · Gowun Batang" subtitle="Soft myeongjo serif — hero lines & space names only" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .eyebrow { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-accent); margin-bottom: 12px; }
  .hero { font-family: var(--font-display); font-weight: 700; font-size: 40px; line-height: 1.16;
    letter-spacing: -0.022em; color: var(--text-primary); margin: 0 0 18px; }
  .names { font-family: var(--font-display); font-weight: 400; font-size: 26px; color: var(--text-secondary);
    letter-spacing: -0.02em; }
  .meta { font-family: var(--font-sans); font-size: 12px; color: var(--text-muted); margin-top: 16px; }
</style></head>
<body>
  <div class="eyebrow">함께 짓다</div>
  <h1 class="hero">우리 공간의 이름을<br />함께 지어주세요</h1>
  <div class="names">본당 · 소예배실 · 새가족부실 · Aa Bb 123</div>
  <div class="meta">Gowun Batang (곱은바탕) · 400 / 700 · --font-display</div>
</body></html>
