<!-- @dsCard group="Type" viewport="700x230" name="UI · Pretendard" subtitle="Every functional word — body, labels, captions" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-sans);
    color: var(--text-primary); }
  .label { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  .body { font-size: 17px; line-height: 1.78; color: var(--text-primary); max-width: 56ch; margin: 0 0 14px;
    letter-spacing: -0.006em; }
  .cap { font-size: 13px; color: var(--text-muted); }
  .meta { font-size: 12px; color: var(--text-muted); margin-top: 16px; }
</style></head>
<body>
  <div class="label">신청자 정보 · 이름</div>
  <p class="body">각 공간별로 1개는 필수, 1개는 선택으로 이름을 제안할 수 있어요. 제안해 주신 이름 중 상위 후보는
    추후 현장 스티커 투표로 최종 결정됩니다.</p>
  <div class="cap">* 핸드폰 번호는 본인 확인용으로만 사용됩니다.</div>
  <div class="meta">Pretendard Variable · 400 / 500 / 600 / 700 · --font-sans</div>
</body></html>
