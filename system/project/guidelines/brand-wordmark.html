<!-- @dsCard group="Brand" viewport="700x220" name="Wordmark" subtitle="No logo was supplied — the mark is typographic (Gowun Batang)" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-page); font-family: var(--font-sans);
    display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
  .lockup { display: flex; flex-direction: column; gap: 6px; }
  .mark { font-family: var(--font-display); font-weight: 700; font-size: 34px; letter-spacing: -0.03em;
    color: var(--text-primary); line-height: 1; }
  .mark .dot { color: var(--accent); }
  .tag { font-size: 12px; letter-spacing: 0.02em; color: var(--text-muted); }
  .onink { background: var(--ink); border-radius: 16px; padding: 20px 24px; }
  .onink .mark { color: var(--paper); }
  .note { font-size: 11px; color: var(--text-muted); max-width: 200px; line-height: 1.6; }
</style></head>
<body>
  <div class="lockup">
    <div class="mark">공간 이름 공모전<span class="dot">.</span></div>
    <div class="tag">함께 짓다 · 우리 공간의 이름을 함께</div>
  </div>
  <div class="onink"><div class="lockup"><div class="mark">공간 이름 공모전<span class="dot">.</span></div></div></div>
  <div class="note">로고 미제공. 워드마크는 Gowun Batang 활자로 대체했습니다. 실제 마크가 준비되면 교체하세요.</div>
</body></html>
